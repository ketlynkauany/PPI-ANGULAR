<div class="container">

  <h1>Bem-vindo</h1>

  <form>
    <label for="nome">Digite seu nome</label>

    <input
      id="nome"
      name="nome"
      type="text"
      #nome
      (keyup)="alterarMensagem(nome.value)"
      placeholder="Seu nome..."
    >
  </form>

  <div class="msg">
    <p>{{mensagem}}</p>
  </div>

</div>
